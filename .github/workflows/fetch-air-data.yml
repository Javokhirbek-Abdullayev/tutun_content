## PART 5: Enable GitHub Pages

1. Still in your repo — click **Settings**
2. Scroll down the left sidebar to **"Pages"**
3. Under **"Branch"** — click the dropdown that says "None" and select **main**
4. Leave the folder as **/ (root)**
5. Click **Save**
6. A green banner will appear saying your site is being published

Wait about 2 minutes. Then your live data URL will be:

**`https://javokhirbek-abdullayev.github.io/tutun_content/tutun_data.json`**

This is the single URL your Android app will call for everything — live AQI, weather forecast, air pollution forecast, all in one file, always fresh.

