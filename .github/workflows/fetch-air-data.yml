name: Fetch Bishkek Air Quality Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch AQI from AQICN
        env:
          AQICN_API_KEY: ${{ secrets.AQICN_API_KEY }}
        run: |
          curl -s "https://api.waqi.info/feed/bishkek/?token=${AQICN_API_KEY}" \
            -o aqi_live.json

      - name: Fetch forecast from OpenWeatherMap One Call 3.0
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          curl -s "https://api.openweathermap.org/data/3.0/onecall?lat=42.8746&lon=74.5698&exclude=minutely,alerts&units=metric&appid=${OPENWEATHER_API_KEY}" \
            -o weather_forecast.json

      - name: Fetch air pollution forecast from OpenWeatherMap
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          curl -s "https://api.openweathermap.org/data/2.5/air_pollution/forecast?lat=42.8746&lon=74.5698&appid=${OPENWEATHER_API_KEY}" \
            -o air_forecast.json

      - name: Combine everything into one file
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{
            \"last_updated\": \"${TIMESTAMP}\",
            \"aqi_live\": $(cat aqi_live.json),
            \"weather_forecast\": $(cat weather_forecast.json),
            \"air_forecast\": $(cat air_forecast.json)
          }" > tutun_data.json

      - name: Commit and push
        run: |
          git config user.name "tutun-bot"
          git config user.email "tutun-bot@users.noreply.github.com"
          git add tutun_data.json
          git diff --staged --quiet || git commit -m "data update $(date -u +%H:%M)"
          git push
```

