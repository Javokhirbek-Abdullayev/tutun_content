## PART 6: Test It Right Now

Don't wait 5 minutes for the automatic schedule:

1. In your repo click the **"Actions"** tab
2. In the left list you'll see **"Fetch Bishkek Air Quality Data"**
3. Click it
4. On the right side click **"Run workflow"** → **"Run workflow"** (the green button)
5. A yellow circle will appear — that means it's running
6. After about 20 seconds it turns green ✅ — success
7. Go back to your repo's main page — you'll now see `tutun_data.json` in the file list
8. Click it and confirm it contains real Bishkek data with a `last_updated` timestamp

If you see a red ❌ instead of green, click on the failed run, then click the failed step — it will show you the exact error. The most common cause is a typo in the secret name. Double-check that your secrets are named exactly `OPENWEATHER_API_KEY` and `AQICN_API_KEY` with no spaces.

